<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Event Feedback</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
  <style>
    /* Global & Vibe Styling */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Montserrat', sans-serif;
      background-color: #000000;
      color: #FFFFFF;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      position: relative;
      -webkit-font-smoothing: antialiased;
    }

    /* =========================================
       OMNI-RESPONSIVE WRAPPER
       Expanded to let the text stretch out widely
       ========================================= */
    .content-wrapper {
      width: 94vw; 
      max-width: 1400px; /* Allows the text to stretch very wide */
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Question Styling */
    h1 {
      font-size: clamp(2.5rem, 5vw, 4.5rem); 
      width: 100%; 
      margin: 0 0 60px 0; 
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 2px;
      line-height: 1.2;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Squircle Buttons */
    .faces-container {
      display: flex;
      gap: 5%; 
      width: 100%; 
      max-width: 750px; /* Strict limit on button width so text overhangs! */
      justify-content: center;
    }

    .face-btn {
      flex: 1; 
      aspect-ratio: 1 / 1; 
      border-radius: 20%; 
      background-color: #FFFFFF; 
      border: clamp(5px, 0.9vw, 10px) solid transparent; 
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, background-color 0.1s;
      gap: clamp(8px, 2.5vw, 20px); 
    }

    .face-btn:active {
      transform: scale(0.92); 
    }

    /* Emoji inside the button */
    .btn-emoji {
      font-size: clamp(5rem, 10vw, 10.5rem); 
      line-height: 1;
    }

    /* Text inside the button */
    .btn-text {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(1.2rem, 2.5vw, 2.2rem); 
      font-weight: 800;
      color: #000000; 
      text-transform: uppercase;
      transition: color 0.1s;
      text-align: center;
    }

    /* Intuitive Colors: Green (YES) and Orange (EXPECTED MORE) */
    .very-happy { border-color: #00953a; }
    .very-happy:active { background-color: #00953a; }
    .very-happy:active .btn-text { color: #FFFFFF; }

    .unhappy { border-color: #FF9800; }
    .unhappy:active { background-color: #FF9800; }
    .unhappy:active .btn-text { color: #FFFFFF; }

    /* Thank You Overlay */
    #thank-you {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #000000; /* Changed to solid black to hide the UI */
      z-index: 10;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: clamp(3rem, 6.5vw, 5.5rem); 
      font-weight: bold;
      text-align: center;
    }

    /* Falling Custom Soccer Balls */
    .soccer-ball {
      position: absolute;
      width: 85px; 
      height: 85px;
      top: -100px; 
      z-index: 15;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to { transform: translateY(150vh) rotate(360deg); } 
    }
  </style>
</head>
<body>

  <div class="content-wrapper">
    <h1>Did Coca-Cola hospitality deliver your ultimate FIFA World Cup Matchday?</h1>

    <div class="faces-container">
      <button class="face-btn very-happy" onclick="finishSurvey('100% YES!')">
        <div class="btn-emoji">😃</div>
        <div class="btn-text">100% YES!</div>
      </button>
      <button class="face-btn unhappy" onclick="finishSurvey('EXPECTED MORE')">
        <div class="btn-emoji">😕</div>
        <div class="btn-text">EXPECTED MORE</div>
      </button>
    </div>
  </div>

  <div id="thank-you">
    <div>Thank you for your feedback!</div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyeWG0NfKaZMNbnl5u-STkRd3NKkFZQVbRyH5ozcJ7_Qv4pkb8fLacgpriGovm8_qfmyA/exec";

    function finishSurvey(answerText) {
      // 1. Show the Thank You screen and trigger balls
      document.getElementById('thank-you').style.display = 'flex';
      triggerSoccerBalls();

      // 2. Send the single answer data to Google Sheets
      const formData = new FormData();
      formData.append('q1', answerText);

      fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: formData
      }).catch(error => console.error('Error recording feedback:', error));

      // 3. Hide the Thank You screen after 2.8 seconds to reset for the next person
      setTimeout(() => {
        document.getElementById('thank-you').style.display = 'none';
      }, 2800);
    }

    function triggerSoccerBalls() {
      for (let i = 0; i < 80; i++) {
        setTimeout(() => {
          const ball = document.createElement('img');
          ball.src = 'KO FIFA Soccer Ball.png';
          ball.classList.add('soccer-ball');
          
          ball.style.left = Math.random() * 100 + 'vw';
          ball.style.animationDuration = (Math.random() * 0.8 + 1.4) + 's';
          
          document.body.appendChild(ball);

          setTimeout(() => {
            ball.remove();
          }, 2200); 
          
        }, i * 10);
      }
    }
  </script>
</body>
</html>
