<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Event Feedback</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
  <style>
    /* Global & Vibe Styling */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Montserrat', sans-serif;
      background-color: #000000;
      color: #FFFFFF;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      position: relative;
      -webkit-font-smoothing: antialiased;
    }

    /* Progress Bar */
    .progress-container {
      position: absolute;
      top: 45px;
      display: flex;
      gap: 15px;
    }

    .progress-line {
      width: 90px;
      height: 7px;
      border-radius: 3.5px;
      background-color: #333333; 
      transition: background-color 0.3s ease;
    }

    .progress-line.active {
      background-color: #FFFFFF; 
    }

    /* =========================================
       OMNI-RESPONSIVE WRAPPER (PADDED EDGES)
       Pulled the width down to 86vw to create a 
       beautiful, safe border on the left and right.
       ========================================= */
    .content-wrapper {
      width: 86vw; 
      max-width: min(1200px, 150vh); 
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Question Styling */
    h1 {
      font-size: clamp(2rem, 4.5vw, 3.8rem); 
      width: 100%; 
      margin: 0 0 50px 0; 
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 2px;
      line-height: 1.2;
      min-height: 120px; 
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Squircle Buttons */
    .faces-container {
      display: flex;
      gap: 3.5%; 
      width: 100%; 
      justify-content: space-between;
    }

    .face-btn {
      flex: 1; 
      aspect-ratio: 1 / 1; 
      border-radius: 20%; 
      background-color: #FFFFFF; 
      border: clamp(5px, 0.9vw, 10px) solid transparent; 
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, background-color 0.1s;
      gap: clamp(8px, 2.5vw, 20px); 
    }

    .face-btn:active {
      transform: scale(0.92); 
    }

    /* Emoji inside the button */
    .btn-emoji {
      font-size: clamp(3.5rem, 7vw, 7.5rem); 
      line-height: 1;
    }

    /* Text inside the button */
    .btn-text {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(1.2rem, 2.2vw, 1.8rem); 
      font-weight: 800;
      color: #000000; 
      text-transform: uppercase;
      transition: color 0.1s;
    }

    /* Intuitive Colors: Outline default, Fill on active */
    .very-happy { border-color: #00953a; }
    .very-happy:active { background-color: #00953a; }
    .very-happy:active .btn-text { color: #FFFFFF; }

    .happy { border-color: #8BC34A; }
    .happy:active { background-color: #8BC34A; }
    .happy:active .btn-text { color: #FFFFFF; }

    .unhappy { border-color: #FF9800; }
    .unhappy:active { background-color: #FF9800; }
    .unhappy:active .btn-text { color: #FFFFFF; }

    .very-unhappy { border-color: #D32F2F; }
    .very-unhappy:active { background-color: #D32F2F; }
    .very-unhappy:active .btn-text { color: #FFFFFF; }

    /* Restart Button */
    .restart-btn {
      position: absolute;
      bottom: 30px;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.25);
      font-family: inherit;
      font-size: 1.2rem;
      font-weight: 600;
      text-transform: uppercase;
      cursor: pointer;
      padding: 10px 20px;
      transition: color 0.2s ease;
    }

    .restart-btn:active {
      color: rgba(255, 255, 255, 0.6);
    }

    /* Thank You Overlay */
    #thank-you {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(0, 0, 0, 0.95);
      z-index: 10;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: clamp(3rem, 6.5vw, 5.5rem); 
      font-weight: bold;
      text-align: center;
    }

    /* Falling Custom Soccer Balls */
    .soccer-ball {
      position: absolute;
      width: 85px; 
      height: 85px;
      top: -100px; 
      z-index: 15;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to { transform: translateY(150vh) rotate(360deg); } 
    }
  </style>
</head>
<body>

  <div class="progress-container">
    <div class="progress-line" id="line-1"></div>
    <div class="progress-line" id="line-2"></div>
    <div class="progress-line" id="line-3"></div>
  </div>

  <div class="content-wrapper">
    <h1 id="question-text">Did you enjoy today’s hospitality experience?</h1>

    <div class="faces-container">
      <button class="face-btn very-happy" onclick="handleAnswer('Absolutely!')">
        <div class="btn-emoji">😃</div>
        <div class="btn-text">Absolutely!</div>
      </button>
      <button class="face-btn happy" onclick="handleAnswer('Mostly')">
        <div class="btn-emoji">🙂</div>
        <div class="btn-text">Mostly</div>
      </button>
      <button class="face-btn unhappy" onclick="handleAnswer('Not Really')">
        <div class="btn-emoji">😕</div>
        <div class="btn-text">Not Really</div>
      </button>
      <button class="face-btn very-unhappy" onclick="handleAnswer('Not at All')">
        <div class="btn-emoji">☹️</div>
        <div class="btn-text">Not at All</div>
      </button>
    </div>
  </div>

  <button class="restart-btn" onclick="resetFlow()">Restart</button>

  <div id="thank-you">
    <div>Thank you for your feedback!</div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyeWG0NfKaZMNbnl5u-STkRd3NKkFZQVbRyH5ozcJ7_Qv4pkb8fLacgpriGovm8_qfmyA/exec";

    // Application State
    const questions = [
      "Did you enjoy today’s hospitality experience?",
      "Did the event feel uniquely Coca-Cola?",
      "Did the event contribute to your unforgettable FIFA World Cup Experience?"
    ];
    let currentQuestionIndex = 0;
    let userAnswers = [];

    window.onload = () => {
      renderQuestion();
    };

    function handleAnswer(answerText) {
      userAnswers.push(answerText);

      if (currentQuestionIndex < questions.length - 1) {
        currentQuestionIndex++;
        renderQuestion();
      } else {
        finishSurvey();
      }
    }

    function renderQuestion() {
      document.getElementById('question-text').innerText = questions[currentQuestionIndex];

      document.getElementById('line-1').className = currentQuestionIndex >= 0 ? 'progress-line active' : 'progress-line';
      document.getElementById('line-2').className = currentQuestionIndex >= 1 ? 'progress-line active' : 'progress-line';
      document.getElementById('line-3').className = currentQuestionIndex >= 2 ? 'progress-line active' : 'progress-line';
    }

    function finishSurvey() {
      document.getElementById('thank-you').style.display = 'flex';
      triggerSoccerBalls();

      const formData = new FormData();
      formData.append('q1', userAnswers[0]);
      formData.append('q2', userAnswers[1]);
      formData.append('q3', userAnswers[2]);

      fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: formData
      }).catch(error => console.error('Error recording feedback:', error));

      setTimeout(() => {
        document.getElementById('thank-you').style.display = 'none';
        resetFlow();
      }, 3000);
    }

    function resetFlow() {
      userAnswers = [];
      currentQuestionIndex = 0;
      renderQuestion();
    }

    function triggerSoccerBalls() {
      for (let i = 0; i < 80; i++) {
        setTimeout(() => {
          const ball = document.createElement('img');
          ball.src = 'KO FIFA Soccer Ball.png';
          ball.classList.add('soccer-ball');
          
          ball.style.left = Math.random() * 100 + 'vw';
          ball.style.animationDuration = (Math.random() * 0.8 + 1.4) + 's';
          
          document.body.appendChild(ball);

          setTimeout(() => {
            ball.remove();
          }, 2200); 
          
        }, i * 10);
      }
    }
  </script>
</body>
</html>
