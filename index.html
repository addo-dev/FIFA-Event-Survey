<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Event Feedback</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
  <style>
    /* Coca-Cola / FIFA Vibe Styling */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Montserrat', sans-serif;
      background-color: #F40009; /* Coca-Cola Red */
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    h1 {
      font-size: 4rem;
      margin-bottom: 3rem;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    .faces-container {
      display: flex;
      gap: 2rem;
    }

    .face-btn {
      width: 250px;
      height: 250px;
      border-radius: 50%;
      border: 8px solid white;
      font-size: 10rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s;
      box-shadow: 0 8px 15px rgba(0,0,0,0.2);
    }

    .face-btn:active {
      transform: scale(0.9);
    }

    /* Intuitive Colors */
    .very-happy { background-color: #4CAF50; }
    .happy { background-color: #8BC34A; }
    .unhappy { background-color: #FF9800; }
    .very-unhappy { background-color: #D32F2F; }

    /* Thank You Overlay */
    #thank-you {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(244, 0, 9, 0.95);
      z-index: 10;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
      font-weight: bold;
      text-align: center;
    }

    /* Falling Soccer Balls */
    .soccer-ball {
      position: absolute;
      font-size: 3rem;
      top: -50px;
      z-index: 15;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to { transform: translateY(110vh) rotate(360deg); }
    }
  </style>
</head>
<body>

  <h1>How is your experience today?</h1>

  <div class="faces-container">
    <button class="face-btn very-happy" onclick="submitFeedback('Very Happy')">😃</button>
    <button class="face-btn happy" onclick="submitFeedback('Happy')">🙂</button>
    <button class="face-btn unhappy" onclick="submitFeedback('Unhappy')">😕</button>
    <button class="face-btn very-unhappy" onclick="submitFeedback('Very Unhappy')">☹️</button>
  </div>

  <div id="thank-you">
    <div>Thank you for your feedback!</div>
  </div>

  <script>
    // --- REPLACE THIS URL WITH YOUR GOOGLE APPS SCRIPT WEB APP URL ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyeWG0NfKaZMNbnl5u-STkRd3NKkFZQVbRyH5ozcJ7_Qv4pkb8fLacgpriGovm8_qfmyA/exec";

    function submitFeedback(rating) {
      // 1. Show the Thank You screen
      document.getElementById('thank-you').style.display = 'flex';
      
      // 2. Trigger Soccer Balls
      triggerSoccerBalls();

      // 3. Send Data to Google Sheets
      const formData = new FormData();
      formData.append('rating', rating);

      // We use mode: 'no-cors' so the browser doesn't block the request to the Google script.
      fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: formData
      }).catch(error => console.error('Error recording feedback:', error));

      // 4. Reset after 3 seconds for the next person
      setTimeout(() => {
        document.getElementById('thank-you').style.display = 'none';
      }, 2500);
    }

    function triggerSoccerBalls() {
      for (let i = 0; i < 20; i++) {
        setTimeout(() => {
          const ball = document.createElement('div');
          ball.innerText = '⚽';
          ball.classList.add('soccer-ball');
          
          // Random horizontal position
          ball.style.left = Math.random() * 100 + 'vw';
          
          // Random fall speed between 0.8 and 1.4 seconds
          ball.style.animationDuration = (Math.random() * 0.6 + 0.8) + 's';
          
          document.body.appendChild(ball);

          // Remove the ball after 1.4 seconds
          setTimeout(() => {
            ball.remove();
          }, 1400); 
          
        }, i * 30); // Stagger the balls every 30ms
      }
    }
  </script>
</body>
</html>
